version: '1.0'
metrics:
- id: M0001
  name_zh: 日活跃用户数
  name_en: dau
  aliases:
  - 日活
  - DAU
  - active_users_daily
  - 日活跃用户数
  - dau
  level: 一级
  domain: user
  department: 运营部
  owner: data-ops@simcf.com
  definition: 当日在 APP 有登录/浏览/操作行为的去重用户数
  formula: COUNT(DISTINCT customer_id)
  filters:
  - is_test_user=0
  - is_robot=0
  dedup_key: customer_id
  time_grain: day
  source_tables:
  - sim_dw.dws_customer_active_day
  sql_template: 'SELECT stat_date, COUNT(DISTINCT customer_id) AS dau

    FROM sim_dw.dws_customer_active_day

    WHERE stat_date = ''${date}''

    GROUP BY stat_date'
  related_metrics:
  - M0002
  - M0003
  version: '1.0'
  effective_from: '2025-01-01'
  status: ACTIVE
  is_regulatory: false
- id: M0002
