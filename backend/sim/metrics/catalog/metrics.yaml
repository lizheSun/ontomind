- id: M0079
  name_zh: Vintage MOB3 逾期率
  name_en: vintage_mob3_overdue_rate
  aliases:
  - vintage_3
  - Vintage MOB3 逾期率
  - vintage_mob3_overdue_rate
  level: 二级
  domain: risk
  department: 风险管理部
  owner: risk@simcf.com
  definition: 放款后 3 个月的逾期率（按放款月分组）
  formula: overdue_in_mob3 / total_loans_in_vintage
  filters: []
  dedup_key: null
  time_grain: month
  source_tables:
  - sim_dw.dwd_credit_loan
  - sim_dw.dwd_credit_overdue
  sql_template: "SELECT DATE_FORMAT(l.disburse_date,'%Y-%m') vintage,\n       COUNT(DISTINCT\
    \ o.loan_id)/COUNT(DISTINCT l.loan_id) rate_mob3\nFROM sim_dw.dwd_credit_loan\
    \ l\nLEFT JOIN sim_dw.dwd_credit_overdue o\n  ON o.loan_id=l.loan_id\n AND o.overdue_start_date\
    \ <= DATE_ADD(l.disburse_date,INTERVAL 90 DAY)\nGROUP BY DATE_FORMAT(l.disburse_date,'%Y-%m')"
  related_metrics: []
  version: '1.0'
  effective_from: '2025-01-01'
  status: ACTIVE
  is_regulatory: false
