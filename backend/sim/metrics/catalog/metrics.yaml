- id: M0115
  name_zh: 投诉率
  name_en: complaint_rate
  aliases:
  - 投诉占比
  - 投诉率
  - complaint_rate
  level: 一级
  domain: operation
  department: 客服中心
  owner: csm@simcf.com
  definition: 投诉工单 / 当日活跃客户
  formula: complaint / active_users
  filters: []
  dedup_key: null
  time_grain: day
  source_tables:
  - sim_dw.dwd_csm_ticket
  - sim_dw.dws_customer_active_day
  sql_template: "SELECT t.created_date,\n       SUM(t.is_complaint) / (SELECT COUNT(*)\
    \ FROM sim_dw.dws_customer_active_day WHERE stat_date=t.created_date)\n      \
    \ AS complaint_rate\nFROM sim_dw.dwd_csm_ticket t\nWHERE t.created_date='${date}'\
    \ GROUP BY t.created_date"
  related_metrics: []
  version: '1.0'
  effective_from: '2025-01-01'
  status: ACTIVE
  is_regulatory: false
