  - 拨备覆盖率
  - provision_coverage_ratio
  level: 一级
  domain: finance
  department: 风险管理部
  owner: risk@simcf.com
  definition: 贷款损失准备 / 不良贷款余额
  formula: provision / npl
  filters: []
  dedup_key: null
  time_grain: month
  source_tables:
  - sim_dw.dwd_credit_overdue
  sql_template: "-- 简化：假设拨备 = 3% 在贷余额\nSELECT 0.03 * SUM(l.principal) / NULLIF(SUM(o.overdue_amount),0)\
    \ AS provision_ratio\nFROM sim_dw.dwd_credit_loan l\nLEFT JOIN sim_dw.dwd_credit_overdue\
    \ o\n  ON o.loan_id=l.loan_id AND o.stage IN ('M3','M3+')\nWHERE l.disburse_date\
    \ <= '${date}'"
  related_metrics: []
  version: '1.0'
  effective_from: '2025-01-01'
  status: ACTIVE
  is_regulatory: true
