  definition: 所有活跃借据的剩余本金合计
  formula: SUM(remaining_principal)
  filters:
  - status IN ('NORMAL','OVERDUE')
  dedup_key: loan_id
  time_grain: day
  source_tables:
  - sim_dw.dwd_credit_loan
  sql_template: "-- 简化：以放款金额扣减已还本金\nSELECT\n  SUM(l.principal) - IFNULL((\n    SELECT\
    \ SUM(principal_paid) FROM sim_dw.dwd_credit_repayment r\n    WHERE r.loan_id=l.loan_id\
    \ AND r.pay_date <= '${date}'\n  ), 0) AS outstanding_balance\nFROM sim_dw.dwd_credit_loan\
    \ l\nWHERE l.status IN ('NORMAL','OVERDUE') AND l.disburse_date <= '${date}'"
  related_metrics: []
  version: '1.0'
  effective_from: '2025-01-01'
  status: ACTIVE
  is_regulatory: false
- id: M0031
  name_zh: 30 天支用率
