  name_en: overdue_rate_m1
  aliases:
  - M1_rate
  - 首逾率
  - M1 逾期率
  - overdue_rate_m1
  level: 一级
  domain: risk
  department: 风险管理部
  owner: risk@simcf.com
  definition: M1 及以上逾期借据数 / 总借据数
  formula: m1+_loan_count / total_loan_count
  filters: []
  dedup_key: null
  time_grain: day
  source_tables:
  - sim_dw.dwd_credit_loan
  - sim_dw.dwd_credit_overdue
  sql_template: "SELECT\n  COUNT(DISTINCT o.loan_id) / (SELECT COUNT(*) FROM sim_dw.dwd_credit_loan\
    \ WHERE disburse_date<='${date}')\n  AS overdue_rate_m1\nFROM sim_dw.dwd_credit_overdue\
    \ o\nWHERE o.stage IN ('M1','M2','M3','M3+')"
