  definition: 过去 30 天内在 APP 有活跃行为的去重用户数
  formula: COUNT(DISTINCT customer_id) OVER 30 days
  filters: []
  dedup_key: customer_id
  time_grain: rolling_30d
  source_tables:
  - sim_dw.dws_customer_active_day
  sql_template: 'SELECT COUNT(DISTINCT customer_id) AS mau

    FROM sim_dw.dws_customer_active_day

    WHERE stat_date BETWEEN DATE_SUB(''${date}'', INTERVAL 29 DAY) AND ''${date}'''
  related_metrics:
  - M0001
  - M0003
  version: '1.0'
  effective_from: '2025-01-01'
  status: ACTIVE
  is_regulatory: false
