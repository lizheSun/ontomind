  aliases:
  - 支用率
  - utilization_30d
  - 30 天支用率
  - draw_rate_30d
  level: 一级
  domain: credit
  department: 自营信贷产品部
  owner: credit@simcf.com
  definition: 授信后 30 天内产生放款的客户占比
  formula: drawn_30d / approved
  filters: []
  dedup_key: null
  time_grain: month
  source_tables:
  - sim_credit_core.credit_limit
  - sim_credit_core.loan
  sql_template: "SELECT DATE_FORMAT(cl.created_at,'%Y%m') AS month,\n       COUNT(DISTINCT\
    \ l.customer_id)/COUNT(DISTINCT cl.customer_id) AS draw_rate\nFROM sim_credit_core.credit_limit\
    \ cl\nLEFT JOIN sim_credit_core.loan l ON l.customer_id=cl.customer_id\n AND l.disburse_time\
    \ BETWEEN cl.created_at AND DATE_ADD(cl.created_at,INTERVAL 30 DAY)\nGROUP BY\
    \ DATE_FORMAT(cl.created_at,'%Y%m')"
  related_metrics: []
  version: '1.0'
  effective_from: '2025-01-01'
  status: ACTIVE
  is_regulatory: false
