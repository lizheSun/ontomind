- id: M0006
  name_zh: 次日留存率
  name_en: d1_retention_rate
  aliases:
  - d1_retention
  - 次留
  - 次日留存率
  - d1_retention_rate
  level: 二级
  domain: user
  department: 运营部
  owner: growth@simcf.com
  definition: 新注册用户第二天回访率
  formula: d1_returned / d0_registered
  filters: []
  dedup_key: customer_id
  time_grain: day
  source_tables:
  - sim_dw.dim_customer
  - sim_dw.dws_customer_active_day
  sql_template: "SELECT c.reg_date,\n       COUNT(DISTINCT a.customer_id) / COUNT(DISTINCT\
    \ c.customer_id) AS d1_retention\nFROM sim_dw.dim_customer c\nLEFT JOIN sim_dw.dws_customer_active_day\
    \ a\n    ON a.customer_id=c.customer_id AND a.stat_date=DATE_ADD(c.reg_date,INTERVAL\
    \ 1 DAY)\nWHERE c.reg_date = '${date}' AND c.is_current=1\nGROUP BY c.reg_date"
  related_metrics: []
  version: '1.0'
  effective_from: '2025-01-01'
  status: ACTIVE
  is_regulatory: false
